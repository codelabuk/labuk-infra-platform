apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-defaults
  namespace: spark
data:
  spark-defaults.conf: |
    spark.sql.catalog.iceberg=org.apache.iceberg.spark.SparkCatalog
    spark.sql.catalog.iceberg.type=hive
    spark.sql.catalog.iceberg.uri=thrift://hive-metastore.metastore.svc.cluster.local:9083
    spark.sql.catalog.iceberg.warehouse=s3a://warehouse/
    spark.sql.catalog.iceberg.io-impl=org.apache.iceberg.aws.s3.S3FileIO
    spark.sql.defaultCatalog=iceberg
    spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
    spark.hadoop.fs.s3a.endpoint=http://minio.minio.svc.cluster.local:9000
    spark.hadoop.fs.s3a.access.key=sparkadmin
    spark.hadoop.fs.s3a.secret.key=sparkadmin123
    spark.hadoop.fs.s3a.path.style.access=true
    spark.hadoop.fs.s3a.connection.ssl.enabled=false