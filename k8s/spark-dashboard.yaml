---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark-dashboard
  namespace: spark-platform

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spark-dashboard-role
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "namespaces", "services"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["sparkoperator.k8s.io"]
    resources: ["sparkapplications", "scheduledsparkapplications"]
    verbs: ["get", "list", "watch", "create", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spark-dashboard-binding
subjects:
  - kind: ServiceAccount
    name: spark-dashboard
    namespace: spark-platform
roleRef:
  kind: ClusterRole
  name: spark-dashboard-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-dashboard
  namespace: spark-platform
  labels:
    app: spark-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-dashboard
  template:
    metadata:
      labels:
        app: spark-dashboard
    spec:
      serviceAccountName: spark-dashboard
      containers:
        - name: dashboard
          image: spark-dashboard:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: SPARK_NAMESPACE
              value: "spark"
            - name: SPARK_HISTORY_URL
              value: "http://spark-history-server.spark.svc.cluster.local:18080"
            - name: SPARK_HISTORY_EXTERNAL_URL
              value: "https://spark-history.codelabuk.dev"
            - name: DASHBOARD_NAMESPACES
              value: "spark"
            - name: MINIO_ENDPOINT
              value: "minio.minio.svc.cluster.local:9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-user
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-password
            - name: MINIO_BUCKET
              value: "spark-jobs"
            - name: MINIO_EXTERNAL_URL
              value: "https://minio.codelabuk.dev"
            - name: MINIO_SPARK_ENDPOINT
              value: "http://minio.minio.svc.cluster.local:9000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: spark-dashboard
  namespace: spark-platform
  labels:
    app: spark-dashboard
spec:
  type: NodePort
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 32050
      name: http
  selector:
    app: spark-dashboard

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spark-dashboard
  namespace: spark-platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - spark-dashboard.codelabuk.dev
      secretName: spark-dashboard-tls
  rules:
    - host: spark-dashboard.codelabuk.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spark-dashboard
                port:
                  number: 5000